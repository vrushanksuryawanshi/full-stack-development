<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Login</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;font-family:'Poppins',sans-serif;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);position:relative;overflow:hidden}
.blobs{position:fixed;inset:0;pointer-events:none;z-index:0}
.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.4;animation:blob-move 8s ease-in-out infinite}
.b1{width:400px;height:400px;background:#ff6b6b;top:-100px;left:-100px;animation-delay:0s}
.b2{width:350px;height:350px;background:#4ecdc4;bottom:-80px;right:-80px;animation-delay:2s}
.b3{width:300px;height:300px;background:#ffd93d;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:4s}
@keyframes blob-move{0%,100%{transform:scale(1) translate(0,0)}33%{transform:scale(1.1) translate(20px,-20px)}66%{transform:scale(0.9) translate(-20px,20px)}}
.b3{animation:blob-move3 8s ease-in-out infinite}
@keyframes blob-move3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-45%,-55%) scale(1.1)}}
.card{position:relative;z-index:1;background:rgba(255,255,255,0.12);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.2);border-radius:1.5rem;padding:2.5rem;width:380px;box-shadow:0 25px 50px rgba(0,0,0,0.2)}
.card-logo{text-align:center;font-size:2rem;margin-bottom:0.25rem}
.card-title{text-align:center;font-size:1.4rem;font-weight:600;color:#fff;margin-bottom:0.25rem}
.card-sub{text-align:center;font-size:0.8rem;color:rgba(255,255,255,0.6);margin-bottom:2rem}
.form-group{margin-bottom:1.25rem}
label{display:block;font-size:0.75rem;font-weight:500;color:rgba(255,255,255,0.7);margin-bottom:0.5rem;letter-spacing:0.05em}
input{width:100%;padding:0.85rem 1rem;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:0.75rem;color:#fff;font-family:'Poppins',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s,background 0.2s}
input::placeholder{color:rgba(255,255,255,0.35)}
input:focus{border-color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.15)}
.forgot{text-align:right;margin-top:0.4rem}
.forgot a{font-size:0.75rem;color:rgba(255,255,255,0.6);text-decoration:none}
.forgot a:hover{color:#fff}
.login-btn{width:100%;padding:0.95rem;background:#fff;color:#764ba2;border:none;border-radius:0.75rem;font-family:'Poppins',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;margin-top:0.5rem}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.2)}
.divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;color:rgba(255,255,255,0.35);font-size:0.75rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.15)}
.social-btns{display:flex;gap:0.75rem}
.social-btn{flex:1;padding:0.75rem;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:0.75rem;color:#fff;font-size:0.85rem;font-family:'Poppins',sans-serif;cursor:pointer;transition:background 0.2s;display:flex;align-items:center;justify-content:center;gap:0.5rem}
.social-btn:hover{background:rgba(255,255,255,0.2)}
.signup{text-align:center;margin-top:1.5rem;font-size:0.8rem;color:rgba(255,255,255,0.6)}
.signup a{color:#fff;font-weight:500;text-decoration:none}
</style></head><body>
<div class="blobs"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>
<div class="card">
  <div class="card-logo">✦</div>
  <div class="card-title">Welcome back</div>
  <div class="card-sub">Sign in to your account</div>
  <div class="form-group"><label>Email address</label><input type="email" placeholder="you@example.com"></div>
  <div class="form-group"><label>Password</label><input type="password" placeholder="••••••••"><div class="forgot"><a href="#">Forgot password?</a></div></div>
  <button class="login-btn">Sign In</button>
  <div class="divider">or continue with</div>
  <div class="social-btns">
    <button class="social-btn">G Google</button>
    <button class="social-btn">GitHub</button>
  </div>
  <div class="signup">Don't have an account? <a href="#">Sign up free</a></div>
</div>
</body></html>
