<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Something Big is Coming</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@200;300;400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#050505;color:#fff;font-family:'Manrope',sans-serif;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden}
.bg-noise{position:fixed;inset:0;background:radial-gradient(circle at 50% 50%,rgba(120,40,200,0.15) 0%,transparent 70%)}
.tagline{font-size:0.7rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:2rem;position:relative;z-index:1}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(5rem,18vw,16rem);line-height:0.85;position:relative;z-index:1;letter-spacing:0.02em}
.subtitle{font-size:1rem;font-weight:300;color:rgba(255,255,255,0.5);margin:2rem 0;max-width:400px;line-height:1.7;position:relative;z-index:1}
.neon-btn{
  position:relative;z-index:1;
  display:inline-block;margin-top:1.5rem;
  padding:1rem 3rem;
  font-family:'Manrope',sans-serif;font-size:0.85rem;font-weight:400;letter-spacing:0.15em;text-transform:uppercase;
  color:#b794f4;
  border:1px solid #b794f4;
  text-decoration:none;
  border-radius:0;
  transition:all 0.3s;
  box-shadow:0 0 8px rgba(183,148,244,0.3),inset 0 0 8px rgba(183,148,244,0.05);
  animation:pulse-border 3s ease-in-out infinite
}
@keyframes pulse-border{0%,100%{box-shadow:0 0 8px rgba(183,148,244,0.3),inset 0 0 8px rgba(183,148,244,0.05)}50%{box-shadow:0 0 20px rgba(183,148,244,0.6),inset 0 0 15px rgba(183,148,244,0.1)}}
.neon-btn:hover{background:rgba(183,148,244,0.1);box-shadow:0 0 30px rgba(183,148,244,0.8),inset 0 0 20px rgba(183,148,244,0.2);color:#e9d8fd}
.dots{display:flex;gap:0.75rem;justify-content:center;margin-top:3rem;position:relative;z-index:1}
.dot{width:6px;height:6px;background:rgba(255,255,255,0.15);border-radius:50%;animation:dot-pulse 1.5s ease-in-out infinite}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes dot-pulse{0%,100%{transform:scale(1);background:rgba(255,255,255,0.15)}50%{transform:scale(1.5);background:rgba(183,148,244,0.8)}}
</style></head><body>
<div class="bg-noise"></div>
<div class="tagline">The wait is almost over</div>
<h1>Coming<br>Soon</h1>
<p class="subtitle">We're crafting something extraordinary. Something that will change how you think about what's possible.</p>
<a href="#" class="neon-btn">Notify Me</a>
<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</body></html>
