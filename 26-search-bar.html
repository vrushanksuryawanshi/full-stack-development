<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expanding Search Bar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0d0d0d;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    gap: 4rem;
  }
  h2 { color: #555; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 500; }

  /* ===== VARIANT 1: Icon-first expand ===== */
  .search-v1 { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
  .search-box-1 {
    display: flex;
    align-items: center;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 40px;
    padding: 0 1rem;
    gap: 0.5rem;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    width: 48px;
    overflow: hidden;
  }
  .search-box-1:focus-within {
    width: 340px;
    border-color: #7c6af7;
    background: #111;
    box-shadow: 0 0 0 3px rgba(124,106,247,0.15);
  }
  .search-icon {
    color: #555;
    font-size: 1.1rem;
    flex-shrink: 0;
    width: 20px;
    transition: color 0.3s;
  }
  .search-box-1:focus-within .search-icon { color: #7c6af7; }
  .search-input-1 {
    background: transparent;
    border: none;
    outline: none;
    color: #e0e0e0;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    width: 100%;
    padding: 0.75rem 0;
    opacity: 0;
    transition: opacity 0.3s 0.1s;
  }
  .search-box-1:focus-within .search-input-1 { opacity: 1; }
  .search-input-1::placeholder { color: #444; }

  /* ===== VARIANT 2: Underline expand ===== */
  .search-v2 { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
  .search-box-2 {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    position: relative;
    padding-bottom: 8px;
  }
  .search-box-2::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    width: 30px;
    background: #333;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s;
  }
  .search-box-2:focus-within::after { width: 100%; background: #f59e0b; }
  .icon-2 { color: #666; font-size: 1rem; flex-shrink: 0; transition: color 0.3s; }
  .search-box-2:focus-within .icon-2 { color: #f59e0b; }
  .search-input-2 {
    background: transparent;
    border: none;
    outline: none;
    color: #e0e0e0;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    width: 40px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .search-input-2:focus { width: 280px; }
  .search-input-2::placeholder { color: #444; }

  /* ===== VARIANT 3: Full pill with button ===== */
  .search-v3 { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
  .search-box-3 {
    display: flex;
    align-items: center;
    background: #111;
    border: 1px solid #222;
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.35s ease;
    width: 52px;
  }
  .search-box-3:focus-within {
    width: 360px;
    border-color: #10b981;
    box-shadow: 0 4px 20px rgba(16,185,129,0.15);
  }
  .search-btn-3 {
    background: #10b981;
    border: none;
    color: #fff;
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
    cursor: pointer;
    transition: background 0.2s;
  }
  .search-btn-3:hover { background: #059669; }
  .search-input-3 {
    background: transparent;
    border: none;
    outline: none;
    color: #e0e0e0;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    width: 100%;
    padding: 0 1rem;
    opacity: 0;
    transition: opacity 0.25s 0.15s;
  }
  .search-box-3:focus-within .search-input-3 { opacity: 1; }
  .search-input-3::placeholder { color: #444; }

  /* Tips label */
  .tip { color: #333; font-size: 0.72rem; letter-spacing: 0.05em; }
  .tip span { color: #7c6af7; }
</style>
</head>
<body>

  <div class="search-v1">
    <h2>Variant 1 — Pill Expand</h2>
    <div class="search-box-1">
      <span class="search-icon">⌕</span>
      <input class="search-input-1" type="text" placeholder="Search anything…">
    </div>
    <p class="tip">Click / focus to expand</p>
  </div>

  <div class="search-v2">
    <h2>Variant 2 — Underline Reveal</h2>
    <div class="search-box-2">
      <span class="icon-2">⌕</span>
      <input class="search-input-2" type="text" placeholder="Search…">
    </div>
    <p class="tip">Focus to expand • <span>amber</span> accent</p>
  </div>

  <div class="search-v3">
    <h2>Variant 3 — Button Pill</h2>
    <div class="search-box-3">
      <button class="search-btn-3">⌕</button>
      <input class="search-input-3" type="text" placeholder="Search products, docs…">
    </div>
    <p class="tip">Click button or focus to expand</p>
  </div>

</body>
</html>
