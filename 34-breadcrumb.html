<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breadcrumb Trail</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: #f8faff; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3rem; font-family: 'Inter', sans-serif; padding: 3rem; }
  h2 { font-size: 0.72rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 500; margin-bottom: 0.75rem; text-align: center; }
  .block { width: 100%; max-width: 700px; }

  /* ===== STYLE 1: Arrow tabs ===== */
  .bc1 { display: flex; align-items: stretch; height: 40px; }
  .bc1-item {
    display: flex; align-items: center;
    background: #6366f1; color: #fff;
    padding: 0 1.1rem 0 1.4rem;
    font-size: 0.82rem; font-weight: 500;
    position: relative;
    text-decoration: none;
    transition: background 0.15s;
  }
  .bc1-item:first-child { border-radius: 8px 0 0 8px; padding-left: 1rem; }
  .bc1-item.active { background: #4338ca; font-weight: 700; }
  .bc1-item.muted { background: #818cf8; }
  .bc1-item.pale { background: #a5b4fc; color: #312e81; }
  /* right arrow */
  .bc1-item::after {
    content: '';
    position: absolute; right: -14px; top: 0;
    width: 0; height: 0;
    border-top: 20px solid transparent;
    border-bottom: 20px solid transparent;
    border-left: 14px solid #6366f1;
    z-index: 2;
  }
  .bc1-item.active::after { border-left-color: #4338ca; }
  .bc1-item.muted::after { border-left-color: #818cf8; }
  .bc1-item.pale::after { border-left-color: #a5b4fc; }
  .bc1-item:last-child::after { display: none; }
  /* Inset left arrow (notch) */
  .bc1-item::before {
    content: '';
    position: absolute; left: 0; top: 0;
    width: 0; height: 0;
    border-top: 20px solid #f8faff;
    border-bottom: 20px solid #f8faff;
    border-left: 14px solid transparent;
  }
  .bc1-item:first-child::before { display: none; }

  /* ===== STYLE 2: Slash separator ===== */
  .bc2 { display: flex; align-items: center; flex-wrap: wrap; gap: 0; }
  .bc2-item { display: flex; align-items: center; }
  .bc2-link {
    color: #64748b; font-size: 0.85rem; font-weight: 500; text-decoration: none;
    padding: 0.35rem 0.5rem; border-radius: 6px; transition: background 0.15s, color 0.15s;
  }
  .bc2-link:hover { background: #eef2ff; color: #6366f1; }
  .bc2-link.active { color: #1e293b; font-weight: 600; }
  .bc2-sep { color: #cbd5e1; font-size: 0.85rem; padding: 0 0.1rem; }

  /* ===== STYLE 3: Dot separator ===== */
  .bc3 {
    background: #fff; border: 1px solid #e2e8f0; border-radius: 99px;
    display: inline-flex; align-items: center; padding: 0.35rem 0.75rem; gap: 0.25rem;
  }
  .bc3-item { display: flex; align-items: center; }
  .bc3-link { color: #94a3b8; font-size: 0.8rem; font-weight: 500; text-decoration: none; padding: 0.2rem 0.4rem; border-radius: 6px; transition: color 0.15s; display: flex; align-items: center; gap: 0.3rem; }
  .bc3-link:hover { color: #6366f1; }
  .bc3-link.active { color: #6366f1; font-weight: 700; background: #eef2ff; }
  .bc3-dot { width: 4px; height: 4px; border-radius: 50%; background: #cbd5e1; margin: 0 0.2rem; }

  /* ===== STYLE 4: Dark minimal ===== */
  .bc4 { display: flex; align-items: center; background: #1e293b; border-radius: 10px; padding: 0.6rem 1rem; gap: 0.3rem; }
  .bc4-link { color: #475569; font-size: 0.82rem; font-weight: 500; text-decoration: none; transition: color 0.15s; }
  .bc4-link:hover { color: #e2e8f0; }
  .bc4-link.active { color: #e2e8f0; font-weight: 600; }
  .bc4-sep { color: #334155; font-size: 0.8rem; }
</style>
</head>
<body>

  <div class="block">
    <h2>Style 1 — Arrow Tabs</h2>
    <div class="bc1">
      <a class="bc1-item" href="#">🏠 Home</a>
      <a class="bc1-item muted" href="#">Electronics</a>
      <a class="bc1-item pale" href="#">Laptops</a>
      <a class="bc1-item active" href="#">MacBook Pro 16"</a>
    </div>
  </div>

  <div class="block">
    <h2>Style 2 — Slash Separator</h2>
    <nav class="bc2" aria-label="breadcrumb">
      <div class="bc2-item"><a class="bc2-link" href="#">Home</a><span class="bc2-sep">/</span></div>
      <div class="bc2-item"><a class="bc2-link" href="#">Blog</a><span class="bc2-sep">/</span></div>
      <div class="bc2-item"><a class="bc2-link" href="#">Technology</a><span class="bc2-sep">/</span></div>
      <div class="bc2-item"><a class="bc2-link active" href="#">CSS Grid Guide</a></div>
    </nav>
  </div>

  <div class="block" style="display:flex;justify-content:flex-start;">
    <div>
    <h2>Style 3 — Pill with Dots</h2>
    <div class="bc3">
      <div class="bc3-item"><a class="bc3-link" href="#">🏠</a><div class="bc3-dot"></div></div>
      <div class="bc3-item"><a class="bc3-link" href="#">Dashboard</a><div class="bc3-dot"></div></div>
      <div class="bc3-item"><a class="bc3-link" href="#">Projects</a><div class="bc3-dot"></div></div>
      <div class="bc3-item"><a class="bc3-link active" href="#">nexus-ui</a></div>
    </div>
    </div>
  </div>

  <div class="block">
    <h2>Style 4 — Dark Minimal</h2>
    <nav class="bc4">
      <a class="bc4-link" href="#">Workspace</a>
      <span class="bc4-sep">›</span>
      <a class="bc4-link" href="#">Design System</a>
      <span class="bc4-sep">›</span>
      <a class="bc4-link" href="#">Components</a>
      <span class="bc4-sep">›</span>
      <a class="bc4-link active" href="#">Button.tsx</a>
    </nav>
  </div>

</body>
</html>
